# pie CLI integration tests
#
# Fields:
#   name          - test description (required)
#   args          - CLI flags (e.g. --help, --list-skills)
#   input         - query string sent to the model
#   exit          - expected exit code (omit = don't check)
#   contains      - pattern(s) that MUST appear in output (string or list)
#   not_contains  - pattern(s) that must NOT appear (string or list)
#   filter        - grep pattern to pre-filter output before checking contains/not_contains
#   timeout       - max seconds to wait (default 30)
#   debug         - run with --debug flag (true/false)
#   post          - shell command to run after main test (exit 0 = pass, non-0 = fail)
#   skip          - "online" = skip when model server unavailable
#   parallel      - true = safe to run concurrently with other tests (default false)
#
# Multiple checks in one test: All checks (exit, not_contains) run
# and ALL failures are reported before the test is marked as failed.

tests:
  # ── CLI flags (no API calls, instant) ────────────────────────
  - name: --help shows usage
    args: --help
    exit: 0
    contains:
      - Usage
      - --help
      - list-skills

  - name: --version shows semver
    args: --version
    contains: "0.1.0"

  - name: unknown flag exits non-zero
    args: --nonexistent
    exit: 2

  # ── Skills listing (no API calls, instant) ───────────────────
  - name: --list-skills shows available skills
    args: --list-skills
    contains:
      - filesystem
      - developer

  # ── End-to-end: model executes shell commands ────────────────
  - name: agent executes shell commands
    input: "What is the architecture of this laptop?"
    contains:
      - Darwin
      - arm64
    timeout: 30
    skip: online
    parallel: true

  # ── End-to-end: web search ───────────────────────────────────
  - name: web search returns results
    input: "/web-search latest technology news 2026"
    contains: technology
    timeout: 45
    skip: online
    parallel: true

  # ── End-to-end: JSON output format ───────────────────────────
  - name: --json returns valid JSON
    args: --json
    input: "what is 2+2"
    contains:
      - '"response"'
      - '"session_id"'
      - '"model_used"'
      - '"timestamp"'
    not_contains:
      - "```json"
      - "```"
    timeout: 30
    skip: online
    parallel: true

  # ── End-to-end: repo summarization (main agent reads files) ──
  - name: repo summarization returns project overview
    input: "summarize this repo"
    contains:
      - Rust
      - agent
    timeout: 120
    skip: online
    parallel: false

  # ── Sandbox integration ─────────────────────────────────────
  - name: sandbox srt-settings.json generated
    args: --help
    contains: "Usage"
    timeout: 5
    post: "test -f ~/.pie/srt-settings.json"

  - name: sandbox blocks ~/.ssh reads
    args: --help
    timeout: 5
    post: "! srt --settings ~/.pie/srt-settings.json sh -c 'cat ~/.ssh/known_hosts' 2>/dev/null"

  - name: sandbox blocks unauthorized writes
    args: --help
    timeout: 5
    post: "! srt --settings ~/.pie/srt-settings.json sh -c 'touch /etc/sandbox-test' 2>/dev/null"

  - name: sandbox allows workspace writes
    args: --help
    timeout: 5
    post: "srt --settings ~/.pie/srt-settings.json sh -c 'mktemp -q /tmp/sandbox-test.XXXXXX | xargs rm'"

  - name: sandbox allows workspace reads
    args: --help
    timeout: 5
    post: "srt --settings ~/.pie/srt-settings.json sh -c 'cat Cargo.toml | head -1'"
