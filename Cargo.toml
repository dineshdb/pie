[package]
name = "pie"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "macros", "process", "io-util", "io-std", "sync"] }
dirs = "6"
apple_ai = "0.1.0"
aisdk = { git = "https://github.com/lazy-hq/aisdk", branch = "main" }
tracing = "0.1"
tracing-subscriber = "0.3"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true
opt-level = "z"
